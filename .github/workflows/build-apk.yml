name: Build and Upload APK
on:
  push:
    branches: [main]
    paths: ['android/**']
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace --no-daemon -Pandroid.useAndroidX=true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - working-directory: scripts
        run: npm install

      - name: Debug - check folder id length
        run: echo "DRIVE_APK_FOLDER_ID length is ${#DRIVE_APK_FOLDER_ID}"
        env:
          DRIVE_APK_FOLDER_ID: ${{ secrets.DRIVE_APK_FOLDER_ID }}

      - name: Upload APK to Drive
        working-directory: scripts
        run: